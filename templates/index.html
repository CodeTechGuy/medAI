<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #FBE8CE;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* Sidebar */
.sidebar {
    width: 240px;
    background: #9AB17A;
    padding: 20px;
    color: white;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.sidebar button {
    width: 100%;
    padding: 10px;
    background: #C3CC9B;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: #333;
    font-weight: bold;
}

/* Main Layout */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* Chat Area */
.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column; /* Critical for alignment */
    gap: 15px;
}

/* Message Bubbles */
.message {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 15px;
    font-size: 14px;
    line-height: 1.4;
    position: relative;
    animation: slideIn 0.3s ease;
}

.bot {
    background: #E4DFB5;
    align-self: flex-start; /* Aligns to Left */
    border-bottom-left-radius: 2px;
}

.user {
    background: #9AB17A;
    color: white;
    align-self: flex-end; /* Aligns to Right */
    border-bottom-right-radius: 2px;
}

.message small {
    display: block;
    font-weight: bold;
    margin-bottom: 4px;
    opacity: 0.8;
}

/* Input Area */
.input-area {
    padding: 15px;
    background: #C3CC9B;
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    padding: 10px 20px;
    background: #9AB17A;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Progress & Chart */
.progress-bar-bg { background:#ddd; height:8px; border-radius:10px; margin: 10px; }
.progress-bar { height:8px; width:0%; background:#9AB17A; transition: 0.3s; }
#chart { max-height: 200px; width: 100%; }

/* Hide scrollbar for Chrome, Safari and Opera */
.chat-box::-webkit-scrollbar {
    display: none;
}

/* Hide scrollbar for IE, Edge and Firefox */
.chat-box {
    -ms-overflow-style: none;  /* IE and Edge */
    scrollbar-width: none;  /* Firefox */
    
    /* Ensure the chat box takes up all available space */
    flex: 1;
    overflow-y: auto; 
    display: flex;
    flex-direction: column;
}

/* Optional: Smooth scrolling for a better feel */
html {
    scroll-behavior: smooth;
}
</style>

</head>

<body>

<div class="sidebar">
<h2>🧠 MedAI</h2>
<button onclick="startChat()">New Chat</button>
<button onclick="startVoice()">🎤 Speak</button>
<button onclick="startAssistant()">🤖 Assistant</button>
</div>

<div class="main">

<div style="padding:10px;">
<div class="progress-bar-bg">
<div id="progressBar" class="progress-bar"></div>
</div>
</div>

<div id="chat" class="chat-box"></div>

<canvas id="chart"></canvas>

<div id="explainPanel" class="explain" style="display:none;">
<div id="explainContent"></div>
<hr>
<div id="whyNotContent"></div>
</div>

<div class="input-area">
<input id="inputBox" placeholder="Describe symptoms..." />
<button onclick="sendText()">Send</button>
</div>

</div>

<script>

let questionCount = 0;

// ================= UI =================

// Normal message (user)
function addMessage(text, sender = "bot") {
    const chatContainer = document.getElementById("chat");

    let div = document.createElement("div");
    div.className = "message " + sender;

    let label = sender === "user" ? "You" : "MedAI";
    div.innerHTML = `<small>${label}</small>${text}`;

    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

// Streaming message (bot)
function streamMessage(text, sender = "bot", speed = 15) {
    const chatContainer = document.getElementById("chat");

    let div = document.createElement("div");
    div.className = "message " + sender;

    let label = sender === "user" ? "You" : "MedAI";
    div.innerHTML = `<small>${label}</small><span></span>`;

    chatContainer.appendChild(div);

    let span = div.querySelector("span");
    let i = 0;

    function type() {
        if (i < text.length) {
            span.innerHTML += text.charAt(i);
            i++;
            chatContainer.scrollTop = chatContainer.scrollHeight;
            setTimeout(type, speed);
        }
    }

    type();
}

// ================= Progress =================
function updateProgress(){
    questionCount++;
    document.getElementById("progressBar").style.width =
        (questionCount / 12 * 100) + "%";
}

// ================= Typing =================
function showTyping(){
    addMessage("Typing...", "bot");
}

function removeTyping(){
    let msgs = document.querySelectorAll(".message.bot");
    if(msgs.length > 0 && msgs[msgs.length-1].innerText.includes("Typing")){
        msgs[msgs.length-1].remove();
    }
}

// ================= Send =================
async function sendText(){

    let inputBox = document.getElementById("inputBox");
    let text = inputBox.value.trim();

    if(!text) return;

    addMessage(text,"user");
    inputBox.value="";

    showTyping();

    let controller = new AbortController();

    let timeout = setTimeout(() => {
        controller.abort();
    }, 7000);

    try {
        let res = await fetch("/chat", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({message:text}),
            signal: controller.signal
        });

        let data = await res.json();

        clearTimeout(timeout);
        removeTyping();

        handleResponse(data.response);

    } catch(err) {
        removeTyping();
        addMessage("⚠️ Taking too long... please try again.");
    }
}

// ================= Response =================
function handleResponse(res){

    // 🔥 FINAL RESULT
    if(typeof res === "object" && res.type === "result"){
        streamMessage(res.data, "bot", 10);
        return;
    }

    // 🔥 QUESTION FLOW
    updateProgress();
    streamMessage(res, "bot");
}

// ================= Start =================
async function startChat(){
    let chat = document.getElementById("chat");
    chat.innerHTML = "";

    questionCount = 0;
    document.getElementById("progressBar").style.width = "0%";

    let res = await fetch("/start");
    let data = await res.json();

    streamMessage("Welcome 👋", "bot");
    streamMessage(data.response, "bot");
}

        let text = e.results[e.results.length-1][0].transcript.toLowerCase();
        if(text.includes("hey medai")){
            listenCommand();
        }
    };
}

function listenCommand(){
    let r = new webkitSpeechRecognition();
    r.start();

    r.onresult = e => {
        let text = e.results[0][0].transcript;
        addMessage(text,"user");
        sendVoice(text);
    };
}
